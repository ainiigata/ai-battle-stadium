<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中野AIチャットボット | あなたにぴったりの生成AIが見つかる</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #4fc3f7;
  --dark: #0a1622;
  --dark-card: rgba(255,255,255,0.04);
  --border: rgba(79,195,247,0.25);
  --text-muted: rgba(255,255,255,0.65);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--dark);
  color: #fff;
  font-family: 'IBM Plex Sans JP', 'Montserrat', sans-serif;
  min-height: 100vh;
  line-height: 1.7;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: -10%;
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(79,195,247,0.15), transparent 70%);
  filter: blur(60px);
  z-index: -1;
  animation: drift 30s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  right: -10%;
  width: 50vw;
  height: 50vw;
  background: radial-gradient(circle, rgba(15,90,140,0.4), transparent 70%);
  filter: blur(80px);
  z-index: -1;
  animation: drift 40s ease-in-out infinite alternate-reverse;
}
@keyframes drift {
  from { transform: translate(0,0); }
  to { transform: translate(5%, 5%); }
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

header.app-header {
  text-align: center;
  margin-bottom: 40px;
}
header.app-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 5vw, 42px);
  color: var(--primary);
  letter-spacing: 0.05em;
}
header.app-header p {
  color: var(--text-muted);
  margin-top: 8px;
  font-size: 14px;
}

@keyframes fadeIn { from { opacity:0; transform: translateY(10px);} to {opacity:1; transform:translateY(0);} }

.chat {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.msg {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: fadeIn 0.4s ease;
}
.msg.user {
  justify-content: flex-end;
}
.msg.hero {
  align-items: center;
  flex-wrap: wrap;
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  flex-shrink: 0;
  background-image: var(--nakano-avatar);
  background-size: 250% auto;
  background-position: center 5%;
  background-repeat: no-repeat;
  background-color: var(--dark-card);
  border: 2px solid var(--primary);
}

.hero-img {
  width: 120px;
  border-radius: 12px;
  flex-shrink: 0;
}

.bubble {
  background: var(--dark-card);
  border: 1px solid var(--border);
  border-radius: 16px 16px 16px 4px;
  padding: 14px 18px;
  max-width: 80%;
  min-width: 0;
  font-size: 15px;
}
.bubble.user {
  background: linear-gradient(135deg, var(--primary), #8fe3ff);
  color: var(--dark);
  border: none;
  border-radius: 16px 16px 4px 16px;
  font-weight: 600;
}
.bubble.typing {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 18px;
}
.bubble.typing span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--primary);
  opacity: 0.5;
  animation: bounce 1.2s infinite ease-in-out;
}
.bubble.typing span:nth-child(2) { animation-delay: 0.15s; }
.bubble.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

.quiz-question-text {
  font-size: 16px;
  font-weight: 700;
  margin-top: 6px;
}

.progress-dots {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1px solid var(--border);
}
.dot.active { background: var(--primary); box-shadow: 0 0 6px var(--primary); }
.dot.done { background: rgba(79,195,247,0.5); }

.quick-replies {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-left: 54px;
}

.quick-reply-btn {
  background: var(--dark-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  color: #fff;
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.25s ease, transform 0.25s ease, background 0.25s ease;
  font-family: inherit;
}
.quick-reply-btn:hover {
  border-color: var(--primary);
  background: rgba(79,195,247,0.08);
  transform: translateX(4px);
}
.quick-reply-back {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.msg.bot.result .bubble {
  background: transparent;
  border: none;
  padding: 0;
  max-width: 100%;
}

.result-first {
  background: var(--dark-card);
  border: 1px solid var(--primary);
  border-radius: 20px;
  padding: 32px;
  margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(79,195,247,0.1);
}
.result-rank {
  display: inline-block;
  background: var(--primary);
  color: var(--dark);
  font-weight: 800;
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 999px;
  margin-bottom: 12px;
}
.result-first h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(26px, 5vw, 36px);
  color: var(--primary);
  margin-bottom: 8px;
}
.result-plan { color: var(--text-muted); font-size: 14px; margin-bottom: 16px; }
.result-reasons { list-style: none; margin-bottom: 16px; }
.result-reasons li {
  padding-left: 1.4em;
  position: relative;
  margin-bottom: 8px;
  font-size: 15px;
}
.result-reasons li::before {
  content: '✓';
  position: absolute; left: 0;
  color: var(--primary);
  font-weight: 700;
}
.result-risk {
  background: rgba(255,255,255,0.04);
  border-left: 3px solid var(--primary);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-muted);
  border-radius: 8px;
  margin-bottom: 20px;
}
.result-budget-advice {
  background: rgba(255,255,255,0.04);
  border-left: 3px solid #8fd9a8;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-muted);
  border-radius: 8px;
  margin-bottom: 20px;
}
.result-others {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 600px) { .result-others { grid-template-columns: 1fr; } }
.result-small {
  background: var(--dark-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
}
.result-small .result-rank { font-size: 11px; }
.result-small h3 { font-size: 16px; margin: 6px 0 6px; }
.result-small p { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }

.footer-note {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 24px;
  padding: 0 10px;
}

.btn-primary, .btn-link {
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), #8fe3ff);
  color: var(--dark);
  font-weight: 700;
  text-decoration: none;
  padding: 12px 28px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.btn-primary:hover, .btn-link:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(79,195,247,0.3);
}
.btn-link.small {
  padding: 8px 18px;
  font-size: 12px;
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
}
.actions-center { text-align: center; margin-top: 12px; }
</style>
</head>

<div class="container">
  <header class="app-header">
    <h1>中野AIチャットボット</h1>
    <p>ナカノAIと話して、あなたにぴったりの生成AIを見つけよう</p>
  </header>

  <div class="chat" id="chat"></div>
</div>

          },
          priority: {
            quality: "正確さ・品質は標準的です。",
            speed: "返答スピード・テンポは良好です。",
            value: "無料トークンの範囲で気軽に試せます。",
            autonomy: "自動化・エージェント度は高く、アプリ生成を自動で進めてくれます。"
          },
          environment: {
            A: "ブラウザのみで登録後すぐ使え、インストールが不要なので最適です。",
            B: "ターミナル・エディタへのインストールに抵抗がなくても、ブラウザ完結の手軽さを活かせます。"
          },
          privacy: {
            A: "コードを外部AIサービスに渡すことに特別な軽減策はないため、機密性の高いプロジェクトの扱いには注意が必要です。",
            B: "コードを外部AIに渡すことを気にしないなら、ブラウザだけで手軽にアプリ生成を試せます。"
          }
        },
        risk: "エラー修正の繰り返しでトークンを大量消費しやすく、無料枠を使い切りやすい。プロジェクトを「公開」設定にすると誰でもコードを閲覧可能になる。"
      }
    ],
    footerNote: "AIエージェントはファイルの作成・変更・削除を自律的に行うことがあります。重要なファイルは必ずバックアップを取り、最初は「実行前に確認」の設定で使うことをおすすめします。コードの学習利用に関するプライバシー設定も各サービスでご確認ください"
  }
};

function budgetScore(categoryKey, q2, service) {
  switch (categoryKey) {
    case 'llm':
      if (service.noPaidPlan) return service.scores.value;
      if (q2 === 'A') return service.scores.value;
      if (q2 === 'B') return service.cheapEntry ? 3 : 1;
      return service.topTier ? 3 : 1;
    case 'image':
      if (q2 === 'A') return service.scores.value;
      if (q2 === 'B') return 3;
      return service.hasUpperTier ? 3 : 1;
    case 'video':
      if (q2 === 'A') return service.scores.value;
      return 3;
    case 'coding':
      if (q2 === 'A') return service.scores.value;
      if (q2 === 'B') return service.cheapEntry ? 3 : 1;
      return service.hasUpperTier ? 3 : 1;
  }
}

function extraAdjust(categoryKey, service, answers) {
  switch (categoryKey) {
    case 'llm':
      return (answers.q4 === 'A' && service.highPrivacyRisk) ? -10 : 0;
    case 'image':
      return answers.q4 === 'A' ? (service.commercialAdjustA || 0) : 0;
    case 'video':
      return (answers.q4 === 'A' ? (service.likenessAdjustA || 0) : 0)
           + (answers.q5 === 'A' ? (service.commercialAdjustA || 0) : 0);
    case 'coding':
      return (answers.q4 === 'A' ? (service.environmentAdjustA || 0) : 0)
           + (answers.q5 === 'A' ? (service.privacyAdjustA || 0) : 0)
           + (answers.q1 !== 'autocomplete' ? (service.nonSelfCoderPenalty || 0) : 0);
  }
}

function familiarityAdjust(categoryKey, service, answers) {
  const familiarityKey = (categoryKey === 'llm' || categoryKey === 'image') ? 'q5' : 'q6';
  return (answers[familiarityKey] === 'A' && service.wellKnown) ? 4 : 0;
}

function scoreService(categoryKey, service, answers) {
  let score = 0;
  if (service.tags.indexOf(answers.q1) !== -1) score += 3;
  score += budgetScore(categoryKey, answers.q2, service);
  score += service.scores[answers.q3];
  score += extraAdjust(categoryKey, service, answers);
  score += familiarityAdjust(categoryKey, service, answers);
  return score;
}

const DEFAULT_USAGE_REASON = "幅広い用途に対応できるオールラウンドな選択肢です。";

function buildReasons(categoryKey, service, answers) {
  const r = service.reasonTemplates;
  const reasons = [];
  reasons.push(r.usage[answers.q1] || DEFAULT_USAGE_REASON);
  reasons.push(r.budget[answers.q2]);
  reasons.push(r.priority[answers.q3]);
  if (categoryKey === 'image') {
    reasons.push(r.commercial[answers.q4]);
  } else if (categoryKey === 'video') {
    reasons.push(r.likeness[answers.q4]);
    reasons.push(r.commercial[answers.q5]);
  } else if (categoryKey === 'coding') {
    reasons.push(r.environment[answers.q4]);
    reasons.push(r.privacy[answers.q5]);
  }
  return reasons;
}

function rankServices(categoryKey, answers) {
  const category = CATEGORIES[categoryKey];
  return category.services
    .map(function (service, index) {
      return { service: service, index: index, score: scoreService(categoryKey, service, answers) };
    })
    .sort(function (a, b) {
      if (b.score !== a.score) return b.score - a.score;
      return a.index - b.index;
    });
}

function buildBudgetAdvice(q2) {
  switch (q2) {
    case 'A':
      return '💰 こんな時は課金を検討しても良いかも: 無料枠を毎日使い切ってしまう / もっと高精度な回答や生成物が欲しい / 仕事の効率化に時間を使いたい。月1,000円台のプランから試すのがおすすめです。';
    case 'B':
      return '💰 上記のおすすめプランで十分な体験が得られる予算感です。さらに使い込みたくなったら上位プランへのアップグレードを検討してみましょう。';
    case 'C':
      return '💰 本格利用なら上位プランの性能をフルに活かせます。ただし複数サービスを契約しすぎるとコストが膨らむので、まずは1つに絞って使い込むのがおすすめです。';
  }
}

function renderResultsHtml(category, ranked) {
  const first = ranked[0];
  const rest = ranked.slice(1);

  const firstHtml =
    '<div class="result-first">' +
    '<div class="result-rank">1位 おすすめ</div>' +
    '<h2>' + first.service.name + '</h2>' +
    '<div class="result-plan">無料: ' + first.service.freePlan + '<br>有料: ' + first.service.paidPlans + '</div>' +
    '<ul class="result-reasons">' +
      buildReasons(state.categoryKey, first.service, state.answers).map(function (r) { return '<li>' + r + '</li>'; }).join('') +
    '</ul>' +
    '<div class="result-risk">⚠️ ' + first.service.risk + '</div>' +
    '<div class="result-budget-advice">' + buildBudgetAdvice(state.answers.q2) + '</div>' +
    '<div class="actions-center"><a class="btn-primary" href="https://' + first.service.officialUrl + '" target="_blank" rel="noopener">公式サイトを見る</a></div>' +
    '</div>';

  const othersHtml = '<div class="result-others">' + rest.map(function (entry, i) {
    const reasons = buildReasons(state.categoryKey, entry.service, state.answers);
    return '<div class="result-small">' +
      '<div class="result-rank">' + (i + 2) + '位</div>' +
      '<h3>' + entry.service.name + '</h3>' +
      '<p>' + reasons[0] + '</p>' +
      '<a class="btn-link small" href="https://' + entry.service.officialUrl + '" target="_blank" rel="noopener">公式サイトを見る</a>' +
      '</div>';
  }).join('') + '</div>';

  return firstHtml + othersHtml + '<p class="footer-note">' + category.footerNote + '</p>';
}

const state = {
  categoryKey: null,
  questionIndex: 0,
  answers: {}
};

const GENRE_ICONS = { llm: "💬", image: "🎨", video: "🎬", coding: "💻" };

function scrollToLatest(el) {
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeLastMessage() {
  const chat = document.getElementById('chat');
  if (chat.lastElementChild) chat.lastElementChild.remove();
}

function addBotMessage(html, extraClass) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg bot' + (extraClass ? ' ' + extraClass : '');
  msg.innerHTML = '<div class="avatar"></div><div class="bubble">' + html + '</div>';
  chat.appendChild(msg);
  scrollToLatest(msg);
  return msg;
}

function addUserMessage(text) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = '<div class="bubble user"></div>';
  msg.querySelector('.bubble').textContent = text;
  chat.appendChild(msg);
  scrollToLatest(msg);
}

function addQuickReplies(options, onSelect) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(function (opt) {
    const btn = document.createElement('button');
    btn.className = 'quick-reply-btn' + (opt.value === '__back__' ? ' quick-reply-back' : '');
    btn.textContent = opt.label;
    btn.addEventListener('click', function () {
      wrap.remove();
      onSelect(opt);
    });
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollToLatest(wrap);
}

function showTyping(callback) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing-indicator';
  msg.innerHTML = '<div class="avatar"></div><div class="bubble typing"><span></span><span></span><span></span></div>';
  chat.appendChild(msg);
  scrollToLatest(msg);
  setTimeout(function () {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
    callback();
  }, 500);
}

function buildProgressDots(currentIndex, total) {
  let html = '<div class="progress-dots">';
  for (let i = 0; i < total; i++) {
    let cls = 'dot';
    if (i < currentIndex) cls += ' done';
    if (i === currentIndex) cls += ' active';
    html += '<div class="' + cls + '"></div>';
  }
  html += '</div>';
  return html;
}

function startChat() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  state.categoryKey = null;
  state.questionIndex = 0;
  state.answers = {};

  const hero = document.createElement('div');
  hero.className = 'msg bot hero';
  hero.innerHTML =
    '<img class="hero-img" src="' + NAKANO_IMG + '" alt="ナカノAI">' +
    '<div class="bubble">やっほー!ナカノAIだよ✌️<br>AIツール選びを手伝うよ!</div>';
  chat.appendChild(hero);
  scrollToLatest(hero);

  showGenreSelection();
}

function showGenreSelection() {
  showTyping(function () {
    addBotMessage('今日は何について知りたい?');
    addQuickReplies(
      Object.keys(CATEGORIES).map(function (key) {
        return { value: key, label: GENRE_ICONS[key] + ' ' + CATEGORIES[key].label };
      }),
      function (opt) {
        addUserMessage(opt.label);
        selectGenre(opt.value);
      }
    );
  });
}

function selectGenre(categoryKey) {
  state.categoryKey = categoryKey;
  state.questionIndex = 0;
  state.answers = {};
  askNextQuestion();
}

// removeCount: 直前に積まれたチャットバブルの数(質問・回答・結果カードなど)
function goBackToQuestion(removeCount) {
  for (let i = 0; i < removeCount; i++) removeLastMessage();
  delete state.answers['q' + state.questionIndex];
  state.questionIndex--;
  askNextQuestion();
}

function goBackFromQuestion() {
  if (state.questionIndex === 0) {
    removeLastMessage(); // 現在の質問(Q1)の吹き出し
    removeLastMessage(); // ジャンル選択で選んだ回答の吹き出し
    removeLastMessage(); // 「今日は何について知りたい?」の吹き出し
    state.categoryKey = null;
    state.answers = {};
    showGenreSelection();
  } else {
    goBackToQuestion(3);
  }
}

function askNextQuestion() {
  const category = CATEGORIES[state.categoryKey];
  const question = category.questions[state.questionIndex];
  const total = category.questions.length;

  showTyping(function () {
    addBotMessage(buildProgressDots(state.questionIndex, total) + '<div class="quiz-question-text">' + question.text + '</div>');
    addQuickReplies(
      question.options.concat([{ value: '__back__', label: '← 一つ前に戻る' }]),
      function (opt) {
        if (opt.value === '__back__') {
          goBackFromQuestion();
          return;
        }
        addUserMessage(opt.label);
        selectAnswer(opt.value);
      }
    );
  });
}

function selectAnswer(value) {
  const qKey = 'q' + (state.questionIndex + 1);
  state.answers[qKey] = value;
  state.questionIndex++;
  const category = CATEGORIES[state.categoryKey];
  if (state.questionIndex < category.questions.length) {
    askNextQuestion();
  } else {
    showResultMessage();
  }
}

function goBackFromResult() {
  goBackToQuestion(4);
}

function showResultMessage() {
  const category = CATEGORIES[state.categoryKey];
  const ranked = rankServices(state.categoryKey, state.answers).slice(0, 3);
  showTyping(function () {
    addBotMessage('よし、診断結果が出たよ!');
    addBotMessage(renderResultsHtml(category, ranked), 'result');
    addQuickReplies(
      [
        { value: 'restart', label: 'もう一度診断する 🔄' },
        { value: '__back__', label: '← 一つ前に戻る' }
      ],
      function (opt) {
        if (opt.value === '__back__') {
          goBackFromResult();
          return;
        }
        startChat();
      }
    );
  });
}

function runSelfTests() {
  let pass = 0, fail = 0;
  function check(name, cond) {
    if (cond) {
      pass++;
      console.log('PASS: ' + name);
    } else {
      fail++;
      console.error('FAIL: ' + name);
    }
  }

  let ranked = rankServices('llm', { q1: 'coding', q2: 'A', q3: 'value', q4: 'B' });
  check('LLM: coding/無料/コスパ重視/プライバシー気にしない → DeepSeekが1位', ranked[0].service.name === 'DeepSeek');

  ranked = rankServices('llm', { q1: 'coding', q2: 'A', q3: 'value', q4: 'A' });
  check('LLM: プライバシー重視(Q4=A) → DeepSeekがトップ3から除外', ranked.slice(0, 3).every(function (r) { return r.service.name !== 'DeepSeek'; }));

  ranked = rankServices('image', { q1: 'business', q2: 'A', q3: 'value', q4: 'A' });
  check('画像生成: business/無料/コスパ重視/商用利用 → Geminiが1位', ranked[0].service.name === 'Gemini');

  ranked = rankServices('image', { q1: 'photo', q2: 'C', q3: 'quality', q4: 'A' });
  check('画像生成: photo/しっかり課金/画質重視/商用利用 → Geminiが1位', ranked[0].service.name === 'Gemini');
  check('画像生成: 同条件でGrok Imagineは1位にならない', ranked[0].service.name !== 'Grok Imagine');

  ranked = rankServices('video', { q1: 'audio', q2: 'A', q3: 'audio', q4: 'B', q5: 'B' });
  check('動画生成: audio/無料/音声重視/実写顔なし/個人利用 → Dreaminaが1位', ranked[0].service.name === 'Dreamina');

  ranked = rankServices('video', { q1: 'photo', q2: 'C', q3: 'quality', q4: 'A', q5: 'A' });
  check('動画生成: photo/しっかり課金/画質重視/実写顔あり/商用利用 → Kling AIが1位', ranked[0].service.name === 'Kling AI');
  check('動画生成: 同条件でGrok Imagineは1位にならない', ranked[0].service.name !== 'Grok Imagine');

  ranked = rankServices('coding', { q1: 'nocode', q2: 'A', q3: 'value', q4: 'B', q5: 'B' });
  check('コーディング: nocode/無料/コスパ重視/インストール平気/プライバシー気にしない → Replitが1位', ranked[0].service.name === 'Replit');
  check('コーディング: 同条件でClaude Codeが最下位', ranked[ranked.length - 1].service.name === 'Claude Code');

  ranked = rankServices('coding', { q1: 'vibe', q2: 'A', q3: 'value', q4: 'A', q5: 'A' });
  check('コーディング: vibe/無料/コスパ重視/ブラウザのみ/プライバシー重視 → Codexが1位', ranked[0].service.name === 'Codex');
  check('コーディング: 同条件でClaude Codeは1位にならない', ranked[0].service.name !== 'Claude Code');

  ranked = rankServices('coding', { q1: 'vibe', q2: 'A', q3: 'quality', q4: 'B', q5: 'A', q6: 'B' });
  check('コーディング: vibe/無料/品質重視/プライバシー重視/AI慣れ → Codexが1位', ranked[0].service.name === 'Codex');
  check('コーディング: 同条件でCursorは1位にならない', ranked[0].service.name !== 'Cursor');

  ranked = rankServices('coding', { q1: 'vibe', q2: 'B', q3: 'quality', q4: 'B', q5: 'A', q6: 'B' });
  check('コーディング: vibe/月1000-3000円/品質重視/プライバシー重視/AI慣れ → Claude Codeが1位', ranked[0].service.name === 'Claude Code');
  check('コーディング: 同条件でCursorは1位にならない', ranked[0].service.name !== 'Cursor');

  ranked = rankServices('coding', { q1: 'autocomplete', q2: 'B', q3: 'quality', q4: 'B', q5: 'B', q6: 'B' });
  check('コーディング: autocomplete/月1000-3000円/品質重視 → Cursorが1位(変化なし)', ranked[0].service.name === 'Cursor');

  ranked = rankServices('llm', { q1: 'creative', q2: 'B', q3: 'longContext', q4: 'B', q5: 'A' });
  check('LLM: creative/B予算/longContext重視/プライバシー気にしない/初心者 → Geminiが1位', ranked[0].service.name === 'Gemini');

  ranked = rankServices('image', { q1: 'logo', q2: 'A', q3: 'japanese', q4: 'B' });
  check('画像生成: logo/無料/日本語重視/個人利用 → ChatGPT/Geminiが1位(Recraftは1位にならない)', ['ChatGPT', 'Gemini'].indexOf(ranked[0].service.name) !== -1);

  console.log('セルフテスト: ' + pass + ' pass / ' + fail + ' fail');
}

if (new URLSearchParams(location.search).get('test') === '1') runSelfTests();

document.documentElement.style.setProperty('--nakano-avatar', 'url("' + NAKANO_IMG + '")');
startChat();
</script>
